l_english:
 
 # JEs
 je_xinhai_revolution:0 "Xinhai Revolution"
 je_xinhai_revolution_lobby: "Resentment at the failures of the Qing to resist the encroachment of foreigners and continuing supremacy of Manchu culture may reach a boiling point. The dynasty would do well to succeed in their assertion of Chinese sovereignty, and failing that in there tolerance of the Han."
 je_xinhai_revolution_reason:1 "Continued discrimination against the Han has led to a rise in anti-Manchu sentiment, along with disdain for the failure of the Qing government. Republican support is rising, determined to restore the Han people.\n\nIf the Han continue to be discriminated against, there could be dangerous consequences for [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName].\n\nStabalising Qing rule will grant Han as a [concept_primary_cultures]. Alternatively ending the Qing dynasty by enacting a [GetLawType('law_republic').GetName] will end Manchu supremacy."
 je_chinese_industry:0 "Ineffectual Mining"
 je_chinese_industry_reason:1 "The status of the #bold Progress Bar#! will advance as we #tooltippable;tooltip:[Country.GetTooltipTag],je_chinese_industry_special_tooltip_advance expand#! our railroad network.\n\nThe mining industry in China was hampered by the easily accessible coal deposits being located far from the demand centres. Simultaneously, Qing policy failure involved granting mining licenses in Suzhou to unskilled labourers rather than larger corporate entities.\n\n#bold Ineffectual Mining will decrease linearly as our railroads expand#!"
 je_chinese_industry_goal:0 "Railroad Expansion"
 je_chinese_industry_special_tooltip_advance: "The first railroad per state will not contribute to advancement, however subsequent railroads built after will do."
 je_china_economic_success_tt: "#bold Railroad Expansion#! has reached #variable 100%#!"
 je_china_economic_complete_tt: "Begin the process of political #bold Westernisation#!"
 je_chinese_agriculture: "Growth of Subsistence"
 je_chinese_agriculture_reason: "Throughout the late 18th and early 19th century as the population of China boomed, demand on staple goods increased significantly.\n\nThis led to a reduction in sugar and fuel consumption per capita, and the transition of plantation goods to calorie crops.\n\n#bold Reforming Our Agriculture#!\nResearching fertilisation technologies and building agricultural buildings will advance agricultural reform.\n\nThe weakness of each state's plantation economy will scale proportionally between 75% to 100% [Concept('concept_subsistence_building','$concept_subsistence_buildings$')] [concept_occupancy]. As the agricultural reform advances, there will be a linearly proportionate lessening in the strength of each state-wide $bg_plantations$ economy debuff."
 chinese_agriculture_complete_tt: "#bold Agricultural Reform#! has reached #variable 100#!"
 je_army_reform_china:0 "Army Reforms"
 je_army_reform_china_reason:1 "The status of the #bold Progress Bar#! will #tooltippable;tooltip:[Country.GetTooltipTag],je_army_reform_china_special_tooltip_advance advance#! based on our military technology and certain events. The #bold Progress Bar#! reaching #variable 100%#! will lead to succesful completion of the Army Reforms, phasing out the old #bold Banner System#! and the #bold Green Standard Army#! and making way for the introduction of the #bold New Army#!. \n\nPredating the Jurchen conquest of China and the establishment of the Qing dynasty, the Eight Banners have a long history as a warrior class and have over the centuries been vital for cementing Qing control over China. However powerful institutions grow decadent and the Banners are no exception. Centuries of prosperity have turned the rough steppe riders into gambling-addicted theatergoers. \n\nThe Green Standard army is an army made up of native Han Chinese people, who were initially instrumental in keeping the peace in Northern China. As the need for policing expanded, they managed to spread their influence throughout all of China. Although nowhere near as influential as the Banners, they have so far made the establishment of a formal police force seem unneccessary. Any policing law other than [GetLawType('law_no_police').GetName] will suspend Green Standard activity.  \n\nIf [SCOPE.GetRootScope.GetCountry.GetName] is to survive, the army must be reformed, thus the Banners must be dealt with."
 china_army_reform_tt:0 "Has succesfully completed the #BOLD Army Reforms"
 china_army_reform_rename_tt:0 "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] will be renamed to the #Yellow New Army#!."
 je_army_reform_china_special_tooltip_advance: "The following conditions will #bold advance#! the #bold Progress Bar#!:\n• Experiencing the #BOLD Taiping Rebellion#! #Green 15%#!\n• Experiencing the #BOLD Boxer Rebellion#! #Green 15%#!\n• Researching #BOLD Law Enforcement#! #Green 10%#!\n• Researching each of the following #Green 20%#!:\n  • #bold Army Reserves#!\n  • #bold Logistics#!\n  • #bold Enlistment Offices#!\n  • #bold Military Statistics#!\n  • #bold Wargaming#! \n\nBeing on any Army Model other than [GetLawType('law_peasant_levies').GetName] will reform the army at a rate of #green 1%#! a year."
 
 # Events
 xinhai_revolution_events.1.t:0 "Anti-Manchu Sentiment"
 xinhai_revolution_events.1.d:2 "Angered by the continuing official discrimination in [ROOT.GetCountry.GetName], Han[SCOPE.sCulture('han_culture').GetName] subjects are organizing into dissident republican movements, determined to end the Manchu[SCOPE.sCulture('manchu_culture').GetName] [GetLawType('law_monarchy').GetName] and establish a [GetLawType('law_republic').GetName]. Many courtiers now urge [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] to address this discrimination and curtail the republican threat." 
 xinhai_revolution_events.1.f:0 ""After mature deliberation and thorough preparation, I have decided upon a program of Revolution and a procedure of revolution in three stages. The first stage is the period of military government. The second stage is the period of political tutelage. And the third stage, the implementation of constitutional government.""
 xinhai_revolution_events.1.a:0 "The Imperial Dynasty must be secured"
 xinhai_revolution_events.2.t:0 "The Wuchang Uprising"
 xinhai_revolution_events.2.d:0 "Influenced by revolutionary ideas from the Tongmenghui, an armed rebellion has taken place in [SCOPE.sStrategicRegion('eastern_hubei').GetName] in the Wuchang district of Wuhan, beginning the Xinhai Revolution. Revolutionaries are currently in secret negotiations with Yuan Shikai over the imperial abdication and new Republic."
 xinhai_revolution_events.2.f:0 ""As our state transforms from absolutism to representative democracy, how can we fail to innovate and fall behind other nations? Our nation should thrive to see the world, to see the brightness of democracy, to better pursue fuller democracy on our soils. Under the flag of representative systems, our people only have the right to be politically represented. If we are to pursue democracy, we will possess the rights of initiatives, nullification, and recall. But such people's rights are not appropriate to be exercised on a provincial basis but rather be on a county-wide basis.""
 xinhai_revolution_events.2.a:0 "The Beiyang Army shall restore order"
 xinhai_revolution_events.2.b:0 "The Republic will endure"
 

l_english:
  je_risorgimento: "Risorgimento"
  je_risorgimento_reason: "The winds of nationalism sweeping Europe have begun to pass through [ROOT.GetCountry.GetName], inspiring figures both within our government and without to look towards the restoration of a single, unified Italy.\n\nWithin our [SCOPE.sCulture('north_italian_scope').GetName] and [SCOPE.sCulture('south_italian_scope').GetName] states, we have [Country.MakeScope.Var('italian_states_radicals_total').GetValue|D] radicals out of a total population of [Country.MakeScope.Var('italian_states_pop_total').GetValue|D], representing [Country.MakeScope.Var('italian_states_radicals_total_bar').GetValue|R]#red %#! of our Italian population.\n\n# As a human player, our number of radicals has no effect on our country for this journal entry.\n\n#bold Should AI Italian nations get high enough radicalism, they will lose those radicals and be annexed by the leading Italian power.#!\n\n#bold Italian nations with at least amicable relations in your Customs Union or as your subject have a monthly chance of losing some radicals and being annexed.#!\n$HMPS_LONG_DELIMITER$\n#bold #blue Important:#!  It is only possible to become a unification candiate after either:\n• #gold All #! [SCOPE.sCulture('north_italian_scope').GetName] and [SCOPE.sCulture('south_italian_scope').GetName] countries have researched [GetTechnology('nationalism').GetName]\n• Both of the following:\n    • You control [GetStateRegion('STATE_LOMBARDY').GetName] or [GetStateRegion('STATE_LAZIO').GetName]\n    • You have researched [GetTechnology('pan-nationalism').GetName] or #gold The Peoples Spring Time#! has concluded#!"
  austrian_radicals_cooldown_tt: "Has not used the #bold Encourage Italian Nationalism#! decision in the past #bold three years#!"
  italian_radicals_cooldown_tt: "Has not used the #bold Sponsor Pro-Unification Sentiment#! decision in the past #bold three years#!"
  is_italy_tt: "Has formed the nation of #bold Italy#!"
  italy_will_get_couped_custom: " and the instatement of a #bold democratic republic#!"
  italy_will_get_annexed_custom: " and #red annexation#! into the leading Italian state"

  je_risorgimento_austrian_radicals_button: "Encourage Italian Nationalism"
  je_risorgimento_austrian_radicals_button_desc: "Ever since the end of the Napoleonic Wars, Italian territories have been held by foreign powers. Our journey to unify the peninsula may inspire them to raise arms against their own oppressors."
  je_risorgimento_italian_radicals_button: "Spur Pro-Unification Sentiment"
  je_risorgimento_italian_radicals_button_desc: "Throughout the Italian peninsula, the masses are slowly awakening and turning towards the idea of a unified Italy. If their rulers are not inclined to follow the call, perhaps their people will be."
  ausrad_cooldown_year_tt: "This decision will become available again in #bold three years#!"
  itarad_cooldown_year_tt: "This decision will become available again in #bold three years#!"

#Spain
  je_reconquista_reason:0 "In our moment of greatest need, when the armies of the accursed marshal burned their way through our lands, ingrates and radicals of the lowest sort seized the opportunity to cast away the love and protection of their #italic madre patria#!.\n\nThese misguided fools must learn to know the consequences of their actions. For [ROOT.GetCountry.GetName] is eternal, and her domain over the New World will be restored.\n\n#blue Any reclaimed states within the new world owned by [ROOT.GetCountry.GetName] or a subject will recieve #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_spanish_new_world_migration_tt $modifier_spanish_new_world_migration$#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_spanish_new_world_extractives_tt $modifier_spanish_new_world_extractives$#! decaying for 10 years based on our colonisation laws.#!"
  modifier_HMPS_spain_migration_reconquista_reward:0 "Reconquista Repatriation"
  modifier_HMPS_spain_migration_reconquista_reward_tt_for_more:0 "All Spanish homeland states get #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_HMPS_spain_migration_reconquista_reward_tt $modifier_HMPS_spain_migration_reconquista_reward$ #!"
  modifier_HMPS_spain_migration_reconquista_reward_tt: "[GetStaticModifier('modifier_HMPS_spain_migration_reconquista_reward').GetName|v]\n[GetStaticModifier('modifier_HMPS_spain_migration_reconquista_reward').GetDesc]"
  modifier_spanish_new_world_extractives:0 "Reconquista Extractives"
  modifier_spanish_new_world_extractives_tt: "[GetStaticModifier('modifier_spanish_new_world_extractives').GetName|v]\n[GetStaticModifier('modifier_spanish_new_world_extractives').GetDesc]"
  modifier_spanish_new_world_migration:0 "Reconquista Migration"
  modifier_spanish_new_world_migration_tt: "[GetStaticModifier('modifier_spanish_new_world_migration').GetName|v]\n[GetStaticModifier('modifier_spanish_new_world_migration').GetDesc]"
je_hmps_revanchism_austria_reason:0 "Current [ROOT.GetCountry.GetAdjective] Revanchism: #b #red [ROOT.GetVariable('austria_current_revanchism').GetValue|%]#!#!\n$HMPS_LONG_DELIMITER$\nAt game start, all states within [GetGeographicRegion('geographic_region_revanchism_austria').GetName] are considered your #gold Homeland States#!.\nBy integrating the [GetCulture('north_italian').GetName] [concept_culture], [GetStateRegion('STATE_LOMBARDY').GetName] and [GetStateRegion('STATE_VENETIA').GetName] will be added to the #gold Homeland States#!.\nBy integrating the [GetCulture('polish').GetName] [concept_culture], [GetStateRegion('STATE_WEST_GALICIA').GetName] and [GetStateRegion('STATE_EAST_GALICIA').GetName] will be added to the #gold Homeland States#!.\nBy integrating the [GetCulture('ukrainian').GetName] [concept_culture], [GetStateRegion('STATE_EAST_GALICIA').GetName] and [GetStateRegion('STATE_BUKOVINA').GetName] will be added to the #gold Homeland States#!.\nBy integrating the [GetCulture('romanian').GetName] [concept_culture], [GetStateRegion('STATE_BUKOVINA').GetName], [GetStateRegion('STATE_MOLDAVIA').GetName], and [GetStateRegion('STATE_WALLACHIA').GetName] will be added to the #gold Homeland States#!.\nIf you integrate all those [concept_culture]#gold s#!, every state in [GetGeographicRegion('geographic_region_revanchism_greater_austria').GetName] will be a #gold Homeland State#!.\n$HMPS_LONG_DELIMITER$\n#b Instead of getting any #L Research Bonuses#!, A [concept_subject] will instead gain up to a maximum of #white +1.0#! #yellow Weekly#! [concept_liberty_desire]#!\n$HMPS_LONG_DELIMITER$\n#b While below #red 10%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 4%#!#! #yellow Home#! [concept_defense]\n#b #green 4%#!#! #yellow Home#! [concept_offense]\n#b #green 4%#!#! #yellow Technology Spread for Military#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 10%#!#! and #b #red 25%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 10%#!#! #yellow Home#! [concept_defense]\n#b #green -10%#!#! #yellow Home#! [concept_offense]\n#b #green -10%#!#! [concept_morale] #yellow Loss#!\n#b #green 10%#!#! #yellow Technology Spread for Military#!\n#b #green 5%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 25%#!#! and #b #red 50%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 20%#!#! #yellow Home#! [concept_defense]\n#b #green 20%#!#! #yellow Home#! [concept_offense]\n#b #green -20%#!#! [concept_morale] #yellow Loss#!\n#b #green 20%#!#! [concept_morale] #yellow Recovery#!\n#b #green 20%#!#! #yellow Technology Spread for Military#!\n#b #green 10%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 50%#!#! and #b #red 100%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 40%#!#! #yellow Home#! [concept_defense]\n#b #green 40%#!#! #yellow Home#! [concept_offense]\n#b #green -40%#!#! [concept_morale] #yellow Loss#!\n#b #green 40%#!#! [concept_morale] #yellow Recovery#!\n#b #green 40%#!#! #yellow Technology Spread for Military#!\n#b #green 20%#!#! #yellow Military Research Speed#!\n#b #green 4.0%#!#! #yellow Conscription Rate#!"


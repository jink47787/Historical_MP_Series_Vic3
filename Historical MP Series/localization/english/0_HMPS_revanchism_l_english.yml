je_hmps_revanchism_generic:0 "[ROOT.GetCountry.GetAdjective] Revanchism"
je_hmps_revanchism_generic_reason:0 "Current [ROOT.GetCountry.GetAdjective] Revanchism: #b #red [ROOT.GetVariable('revanchism_states_percent').GetValue|%]#!#!\n$HMPS_LONG_DELIMITER$\n#b Revanchism#! is based on proportion of your [concept_primary_cultures] #gold Homeland States#! which have been lost via war.\n$HMPS_LONG_DELIMITER$\n#b Instead of getting any #L Research Bonuses#!, A [concept_subject] will instead gain up to a maximum of #white +1.0#! #yellow Weekly#! [concept_liberty_desire]#!\n$HMPS_LONG_DELIMITER$\n#b While below #red 10%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 4%#!#! #yellow Home#! [concept_defense]\n#b #green 4%#!#! #yellow Home#! [concept_offense]\n#b #green 4%#!#! #yellow Technology Spread for Military#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 10%#!#! and #b #red 25%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 10%#!#! #yellow Home#! [concept_defense]\n#b #green 10%#!#! #yellow Home#! [concept_offense]\n#b #green -10%#!#! [concept_morale] #yellow Loss#!\n#b #green 10%#!#! #yellow Technology Spread for Military#!\n#b #green 5%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 25%#!#! and #b #red 50%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 20%#!#! #yellow Home#! [concept_defense]\n#b #green 20%#!#! #yellow Home#! [concept_offense]\n#b #green -20%#!#! [concept_morale] #yellow Loss#!\n#b #green 20%#!#! [concept_morale] #yellow Recovery#!\n#b #green 20%#!#! #yellow Technology Spread for Military#!\n#b #green 10%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 50%#!#! and #b #red 100%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 40%#!#! #yellow Home#! [concept_defense]\n#b #green 40%#!#! #yellow Home#! [concept_offense]\n#b #green -40%#!#! [concept_morale] #yellow Loss#!\n#b #green 40%#!#! [concept_morale] #yellow Recovery#!\n#b #green 40%#!#! #yellow Technology Spread for Military#!\n#b #green 20%#!#! #yellow Military Research Speed#!\n#b #green 4.0%#!#! #yellow Conscription Rate#!"
je_hmps_revanchism_rus_buffer_states:0 "[ROOT.GetCountry.GetAdjective] Buffer State Revanchism"
je_hmps_revanchism_rus_buffer_states_reason:0 "Current [ROOT.GetCountry.GetAdjective] Revanchism From Lost Baltic States: #b #red [ROOT.GetVariable('revanchism_baltic_percent').GetValue|%]#!#!\nCurrent [ROOT.GetCountry.GetAdjective] Revanchism From Lost Polish States: #b #red [ROOT.GetVariable('revanchism_poland_percent').GetValue|%]#!#!\nCurrent [ROOT.GetCountry.GetAdjective] Revanchism From Lost Ruthenian States: #b #red [ROOT.GetVariable('revanchism_ukraine_belarus_percent').GetValue|%]#!#!\n$HMPS_LONG_DELIMITER$\nEvery state within [GetGeographicRegion('geographic_region_revanchism_rus_baltics').GetName], [GetGeographicRegion('geographic_region_revanchism_rus_poland').GetName], and [GetGeographicRegion('geographic_region_revanchism_rus_ukraine_belarus').GetName] are also considered #gold Homeland States#! for [ROOT.GetCountry.GetName]\n$HMPS_LONG_DELIMITER$\n#b While between #red 0%#!#! and #b #red 100%#! Baltic Revanchism#!, you will gain up to a maximum of:\n#b #green 5%#!#! #yellow Home#! [concept_defense]\n$HMPS_LONG_DELIMITER$\n#b While between #red 0%#!#! and #b #red 100%#! Polish Revanchism#!, you will gain up to a maximum of:\n#b #green 10%#!#! #yellow Technology Spread for Military#!\n#b #green 10%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 0%#!#! and #b #red 100%#! Ruthenian Revanchism#!, you will gain up to a maximum of:\n#b #green 10%#!#! #yellow Home#! [concept_defense]\n#b #green 20%#!#! [concept_technology_spread]"
je_hmps_revanchism_ottoman:0 "[ROOT.GetCountry.GetAdjective] Revanchism"
je_hmps_revanchism_ottoman_reason:0 "Current [ROOT.GetCountry.GetAdjective] Revanchism: #b #red [ROOT.GetVariable('ottoman_revanchism_percent').GetValue|%]#!#!\n$HMPS_LONG_DELIMITER$\nAt game start, every state within the [GetGeographicRegion('geographic_region_revanchism_ottoman').GetName] that is owned by the [ROOT.GetCountry.GetName] or a [concept_subject] are considered #gold Homeland States#! for the [ROOT.GetCountry.GetName]. Any state within the [GetGeographicRegion('geographic_region_revanchism_ottoman').GetName] that isn't owned by the [ROOT.GetCountry.GetName] will become a #gold Homeland State#! once owned.\nBy integrating the [GetCulture('kurdish').GetName] [concept_culture], every state that is a [GetCulture('kurdish').GetName] [concept_homeland] can become a #gold Homeland State#! for the [ROOT.GetCountry.GetName] once owned.\nBy integrating the [GetCulture('armenian').GetName] [concept_culture], every state that is a [GetCulture('armenian').GetName] [concept_homeland] can become a #gold Homeland State#! for the [ROOT.GetCountry.GetName] once owned.\nBy integrating the [GetCulture('serb').GetName] [concept_culture], every state that is a [GetCulture('serb').GetName] [concept_homeland] can become a #gold Homeland State#! for the [ROOT.GetCountry.GetName] once owned.\nBy integrating the [GetCulture('romanian').GetName] [concept_culture], every state that is a [GetCulture('romanian').GetName] [concept_homeland] can become a #gold Homeland State#! for the [ROOT.GetCountry.GetName] once owned.\nIf you integrate all those [concept_culture]#gold s#!, every state in [GetGeographicRegion('geographic_region_revanchism_greater_ottoman').GetName] can become a #gold Homeland State#!.\n$HMPS_LONG_DELIMITER$\n#b Instead of getting any #L Research Bonuses#!, A [concept_subject] will instead gain up to a maximum of #white +1.0#! #yellow Weekly#! [concept_liberty_desire]#!\n$HMPS_LONG_DELIMITER$\n#b While below #red 10%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 4%#!#! #yellow Home#! [concept_defense]\n#b #green 4%#!#! #yellow Home#! [concept_offense]\n#b #green 4%#!#! #yellow Technology Spread for Military#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 10%#!#! and #b #red 25%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 10%#!#! #yellow Home#! [concept_defense]\n#b #green 10%#!#! #yellow Home#! [concept_offense]\n#b #green -10%#!#! [concept_morale] #yellow Loss#!\n#b #green 10%#!#! #yellow Technology Spread for Military#!\n#b #green 5%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 25%#!#! and #b #red 50%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 20%#!#! #yellow Home#! [concept_defense]\n#b #green 20%#!#! #yellow Home#! [concept_offense]\n#b #green -20%#!#! [concept_morale] #yellow Loss#!\n#b #green 20%#!#! [concept_morale] #yellow Recovery#!\n#b #green 20%#!#! #yellow Technology Spread for Military#!\n#b #green 10%#!#! #yellow Military Research Speed#!\n$HMPS_LONG_DELIMITER$\n#b While between #red 50%#!#! and #b #red 100%#! Revanchism#!, you will gain up to a maximum of:\n#b #green 40%#!#! #yellow Home#! [concept_defense]\n#b #green 40%#!#! #yellow Home#! [concept_offense]\n#b #green -40%#!#! [concept_morale] #yellow Loss#!\n#b #green 40%#!#! [concept_morale] #yellow Recovery#!\n#b #green 40%#!#! #yellow Technology Spread for Military#!\n#b #green 20%#!#! #yellow Military Research Speed#!\n#b #green 4.0%#!#! #yellow Conscription Rate#!"

l_english:
  rule_HMPS_allow_truce_break:0 "Truce Break"
  setting_HMPS_allow_truce_break:0 "Truce Break Allowed"
  setting_HMPS_allow_truce_break_desc:0 "Players will be able to spend Infamy to break Truces."
  setting_HMPS_disallow_truce_break:0 "Truce Break Disallowed"
  setting_HMPS_disallow_truce_break_desc:0 "Players will not be able to spend Infamy to break Truces."

  rule_HMPS_game_rule_auto_infamy_transfer:0 "Automatic Subject Infamy Transfer"
  setting_HMPS_game_rule_auto_infamy_transfer_enabled:0 "Automatic Subject Infamy Transfer Enabled"
  setting_HMPS_game_rule_auto_infamy_transfer_enabled_desc:0 "Automaticly transfer of 50% of infamy gained by subjects to their overlord (done on a monthly tick). Will leave a modifier on the overlord country to show how much infamy has been transfered this way. This does not reduce the infamy of the subject."
  setting_HMPS_game_rule_auto_infamy_transfer_disabled:0 "Automatic Subject Infamy Transfer Disabled"
  setting_HMPS_game_rule_auto_infamy_transfer_disabled_desc:0 "Infamy will not be transfered from subjects to their overlord."
  
  rule_HMPS_game_rule_china_puppets:0 "China Colonial Puppets"
  setting_HMPS_game_rule_china_puppets_enabled:0 "Automatic China Colonial Puppets Enabled"
  setting_HMPS_game_rule_china_puppets_enabled_desc:0 "Any integral chinese state which is owned by a Non-Chinese nation will be given to a newly created colonial subject. Countries with Tibetan or Sinosphere primary cultures are exempt from this."
  setting_HMPS_game_rule_china_puppets_disabled:0 "Automatic China Colonial Puppets Disabled"
  setting_HMPS_game_rule_china_puppets_disabled_desc:0 "Anyone can take chinese states."
  
  rule_HMPS_game_rule_india_puppets:0 "India Colonial Puppets"
  setting_HMPS_game_rule_india_puppets_enabled:0 "Automatic India Colonial Puppets Enabled"
  setting_HMPS_game_rule_india_puppets_enabled_desc:0 "Any Indian state which is owned by a Non-Indian nation will be given to a newly created colonial subject."
  setting_HMPS_game_rule_india_puppets_disabled:0 "Automatic India Colonial Puppets Disabled"
  setting_HMPS_game_rule_india_puppets_disabled_desc:0 "Anyone can take Indian states."
  
  rule_HMPS_punish_major_non_leader_bloc_memebers:0 "Great and Major power Non-Leader Bloc Member Penalty"
  setting_HMPS_punish_major_non_leader_bloc_memebers:0 "Non-Leader Bloc Member Penalties Enabled"
  setting_HMPS_punish_major_non_leader_bloc_memebers_desc:0 "Great and Major Powers who are in a bloc which they are not the leader of will suffer a penalty. This Penalty is mild for Major Powers but very severe for Great Powers."
  setting_HMPS_punish_major_non_leader_bloc_memebers_disabled:0 "Non-Leader Bloc Member Penalties Disabled"
  setting_HMPS_punish_major_non_leader_bloc_memebers_disabled_desc:0 "No penalties are applied to Great and Major Power non-leader Power Bloc memebers."
# Cavalry Rework

# Units

 hmps_combat_unit_type_great_war_cav:0 "Great War Cavalry"
 hmps_combat_unit_type_great_war_cav_desc:0 "Mobile cavalry equipped typically with revolvers and sabers. These cavalry also worked as mounted riflemen when equiped with rifles."

# Commander Orders
 
 hmps_cav_recon_attack:0 "Cavalry Recon Offense"
 hmps_cav_recon_attack_desc:0 "By using cavalry to scout out the terrain ahead of our army, we can ensure that we engage on the best land possible"
 hmps_cav_recon_defend:0 "Cavalry Recon Defense"
 hmps_cav_recon_defend_desc:0 "By using cavalry to scout out the terrain ahead around our encampment, we can use the terrain features to our advantage"
 hmps_flat_land_flank_attack:0 "Flank Attack"
 hmps_flat_land_flank_attack_desc:0 "By utilizing our cavalry to flank the enemy on open and flat land, we can pincer them between our mounted units and our artillery"
